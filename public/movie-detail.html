<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MovieON - movie details </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stylee.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">
               <img src="logo.png" width="25" height="25" style="margin-top: -7.5px; vertical-align: middle;"> movieON
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="toggler-icon">☰</span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Main</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="favorites.html">Favorites <span
                                style="color: #e54b4b !important">❤</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content pt-5">
        <div class="container">
            <a href="javascript:history.back()" class="back-link mb-4 d-inline-block">← Back</a>

            <div id="loadingSpinner" class="text-center py-5">
                <div class="spinner"></div>
                <p class="mt-3 text-muted">Φόρτωση ταινίας...</p>
            </div>

            <div id="movieDetail" style="display:none;">
                <div class="movie-detail-card">
                    <div class="row g-0">
                        <div class="col-lg-4">
                            <div class="detail-poster-wrap">
                                <img id="detailPoster" src="" alt="" class="detail-poster">
                                <div class="detail-rating-badge" id="detailRating"></div>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="detail-info">
                                <div class="detail-category" id="detailCategory"></div>
                                <h1 class="detail-title" id="detailTitle"></h1>
                                <p class="detail-description" id="detailDescription"></p>

                                <div class="detail-meta-grid">
                                    <div class="meta-item">
                                        <span class="meta-label">duration</span>
                                        <span class="meta-value" id="detailDuration"></span>
                                    </div>
                                    <div class="meta-item">
                                        <span class="meta-label">rating</span>
                                        <span class="meta-value" id="detailRatingInfo"></span>
                                    </div>
                                    <div class="meta-item">
                                        <span class="meta-label">year</span>
                                        <span class="meta-value" id="detailYear"></span>
                                    </div>
                                    <div class="meta-item">
                                        <span class="meta-label">month</span>
                                        <span class="meta-value" id="detailMonth"></span>
                                    </div>
                                </div>

                                <button class="fav-btn-large" id="favBtn" onclick="toggleFavoriteDetail()">
                                    <span id="favBtnIcon">♡</span>
                                    <span id="favBtnText">add to favorites</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="errorMsg" class="alert-custom" style="display:none;">
                ⚠ Η ταινία δεν βρέθηκε.
            </div>
        </div>
    </main>


    <footer class="site-footer">
        <div class="container text-center">
            <p class="footer-brand">MovieON</p>
            <p class="footer-copy">© 2026 — Σχεδίαση και Προγραμματισμός για τον Παγκόσμιο Ιστό</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/movie-detail.js"></script>
</body>

</html>
